<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>Font to SVG Exporter & Editor</title>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; margin: 0; padding: 20px; text-align: center; }
        .control-panel { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 900px; margin: 0 auto 30px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .box { background: white; border: 2px solid #ddd; border-radius: 12px; padding: 15px; cursor: pointer; transition: 0.3s; position: relative; }
        .box:hover { border-color: #007bff; transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .box canvas { width: 100%; height: 120px; background: #fff; border-radius: 8px; border: 1px solid #eee; }
        .label { font-weight: bold; font-size: 18px; color: #666; display: block; margin-bottom: 10px; }

        /* Overlay Styles */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #canvas-wrapper { position: relative; border: 3px solid #333; width: 85%; height: 60vh; max-width: 800px; border-radius: 10px; background: white; }
        #full-canvas { width: 100%; height: 100%; touch-action: none; position: relative; z-index: 5; }
        
        /* Guide Lines */
        .guide-lines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .line { position: absolute; width: 100%; border-top: 1.5px dashed #ccc; }
        .baseline { border-top: 2px solid #ff4d4d; top: 70%; }

        .btn-group { margin-top: 25px; display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        button { padding: 12px 25px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 15px; }
        .btn-upload { background: #6f42c1; color: white; }
        .btn-zip { background: #007bff; color: white; }
        .btn-save { background: #28a745; color: white; }
        .btn-cancel { background: #6c757d; color: white; }
        
        input[type="file"] { display: none; }
        .upload-label { padding: 12px 25px; background: #6f42c1; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; display: inline-block; }
    </style>
</head>
<body>

    <div class="control-panel">
        <h2>Font Character Exporter</h2>
        <p>පරිගණකයේ ඇති ෆොන්ට් එකක් (.ttf/.otf) ලබා දෙන්න. එවිට සියලුම අකුරු ස්වයංක්‍රීයව පහත දිස්වේ.</p>
        
        <label class="upload-label" for="fontUpload">Upload & Preview Font</label>
        <input type="file" id="fontUpload" accept=".ttf, .otf" onchange="loadFont(event)">
        
        <div style="margin-top: 20px;">
            <button class="btn-zip" onclick="downloadAll()">Download All as SVG (ZIP)</button>
        </div>
    </div>

    <div class="grid" id="grid"></div>

    <div id="overlay">
        <h2 id="edit-title">Edit Character</h2>
        <div id="canvas-wrapper">
            <div class="guide-lines"><div class="line baseline"></div></div>
            <canvas id="full-canvas"></canvas>
        </div>
        <div class="btn-group">
            <button class="btn-save" onclick="saveAndClose()">Apply Changes</button>
            <button class="btn-cancel" onclick="fullPad.clear()">Clear/Reset</button>
            <button class="btn-cancel" onclick="closeOverlay()">Close</button>
        </div>
    </div>

    <script>
        const characters = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789".split("");
        const pads = {};
        let fullPad, fullCanvas, customFontName = '';

        window.onload = () => {
            fullCanvas = document.getElementById('full-canvas');
            fullPad = new SignaturePad(fullCanvas, { minWidth: 2, maxWidth: 5, penColor: "black" });
            initGrid();
        };

        function initGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            characters.forEach(char => {
                const div = document.createElement('div');
                div.className = 'box';
                div.onclick = () => openEditor(char);
                div.innerHTML = `<span class="label">${char}</span><canvas id="can-${char}"></canvas>`;
                grid.appendChild(div);
                pads[char] = { data: null, canvas: div.querySelector('canvas') };
            });
        }

        async function loadFont(event) {
            const file = event.target.files[0];
            if (!file) return;
            const fontData = await file.arrayBuffer();
            customFontName = 'UploadedFont_' + Date.now();
            const fontFace = new FontFace(customFontName, fontData);
            await fontFace.load();
            document.fonts.add(fontFace);
            
            // එක් එක් අකුර Canvas එකට ඇඳීම (Auto-preview)
            characters.forEach(char => {
                drawCharToCanvas(char);
            });
        }

        function drawCharToCanvas(char) {
            const canvas = pads[char].canvas;
            const ctx = canvas.getContext('2d');
            const ratio = window.devicePixelRatio || 1;
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            ctx.scale(ratio, ratio);

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "black";
            ctx.font = `80px ${customFontName}`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(char, canvas.offsetWidth/2, canvas.offsetHeight/2);
            
            // Edit නොකර බාගත කිරීමට අවශ්‍ය නම් dataURL එක සේව් කර තබා ගනී
            pads[char].data = canvas.toDataURL("image/svg+xml");
        }

        function openEditor(char) {
            if (!customFontName) return alert("පළමුව ෆොන්ට් එකක් Upload කරන්න!");
            currentLetter = char;
            document.getElementById('edit-title').innerText = "Modify: " + char;
            document.getElementById('overlay').style.display = 'flex';

            const ratio = window.devicePixelRatio || 1;
            fullCanvas.width = fullCanvas.offsetWidth * ratio;
            fullCanvas.height = fullCanvas.offsetHeight * ratio;
            fullCanvas.getContext("2d").setTransform(ratio, 0, 0, ratio, 0, 0);

            fullPad.clear();
            // පවතින අකුර editor එකට ගෙන ඒම
            const tempCtx = fullCanvas.getContext('2d');
            tempCtx.fillStyle = "black";
            tempCtx.font = `300px ${customFontName}`;
            tempCtx.textAlign = "center";
            tempCtx.textBaseline = "middle";
            tempCtx.fillText(char, fullCanvas.offsetWidth/2, fullCanvas.offsetHeight/2);
        }

        function saveAndClose() {
            pads[currentLetter].data = fullPad.toDataURL("image/svg+xml");
            const ctx = pads[currentLetter].canvas.getContext('2d');
            const img = new Image();
            img.onload = () => {
                ctx.clearRect(0,0, pads[currentLetter].canvas.width, pads[currentLetter].canvas.height);
                ctx.drawImage(img, 0, 0, pads[currentLetter].canvas.width, pads[currentLetter].canvas.height);
            };
            img.src = pads[currentLetter].data;
            closeOverlay();
        }

        function closeOverlay() { document.getElementById('overlay').style.display = 'none'; }

        async function downloadAll() {
            const zip = new JSZip();
            let count = 0;
            for(let char in pads) {
                if(pads[char].data) {
                    zip.file(`${char}.svg`, pads[char].data.split(',')[1], {base64: true});
                    count++;
                }
            }
            if(count === 0) return alert("Export කිරීමට අකුරු නැත!");
            saveAs(await zip.generateAsync({type: "blob"}), "font_characters_svg.zip");
        }
    </script>
</body>
</html>
