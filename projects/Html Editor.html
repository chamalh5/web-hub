<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HTML Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #1e293b;
            color: white;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background-color: #334155;
            padding: 12px;
            border-bottom: 2px solid #475569;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }

        .header-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        button, .btn-label {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex: 1;
            min-width: 0;
        }

        .btn-upload { background-color: #3b82f6; color: white; }
        .btn-upload:active { background-color: #2563eb; }
        .btn-clear { background-color: #ef4444; color: white; }
        .btn-clear:active { background-color: #dc2626; }
        .btn-preview { background-color: #a855f7; color: white; }
        .btn-preview:active { background-color: #9333ea; }
        
        /* New Paste Button style */
        .btn-paste { background-color: #10b981; color: white; }
        .btn-paste:active { background-color: #059669; }

        .btn-download {
            background-color: #22c55e;
            color: white;
            width: 100%;
            padding: 14px;
            font-size: 16px;
        }
        .btn-download:active { background-color: #16a34a; }

        /* Search Bar Style */
        .search-bar {
            background-color: #1e293b;
            padding: 8px 12px;
            display: flex;
            gap: 8px;
            border-bottom: 1px solid #475569;
        }
        .search-bar input {
            flex: 1;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #475569;
            background-color: #0f172a;
            color: white;
            outline: none;
        }
        .btn-find {
            background-color: #475569;
            color: white;
            padding: 0 15px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            border: none;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }

        .editor-section, .preview-section {
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 0;
        }

        .section-header {
            background-color: #334155;
            padding: 10px 12px;
            border-bottom: 1px solid #475569;
            font-weight: 600;
            font-size: 14px;
            flex-shrink: 0;
        }

        #htmlCode {
            flex: 1;
            padding: 12px;
            background-color: #0f172a;
            color: #4ade80;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            border: none;
            resize: none;
            outline: none;
            width: 100%;
            min-height: 0;
        }

        #preview {
            flex: 1;
            background-color: white;
            border: none;
            width: 100%;
            min-height: 0;
        }

        /* Footer */
        .footer {
            background-color: #334155;
            padding: 12px;
            border-top: 2px solid #475569;
            flex-shrink: 0;
        }

        .file-input-group {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
        }

        .footer label {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
        }

        .footer input {
            flex: 1;
            padding: 12px;
            background-color: #475569;
            border: 1px solid #64748b;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .footer input:focus { border-color: #3b82f6; }
        .hidden { display: none !important; }
        #fileInput { display: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>HTML Editor</h1>
        <div class="header-buttons">
            <label for="fileInput" class="btn-label btn-upload">Upload</label>
            <input type="file" id="fileInput" accept=".html,.htm,.txt">
            
            <button class="btn-clear" onclick="clearCode()">Clear</button>
            
            <button class="btn-preview" onclick="togglePreview()">
                <span id="previewBtnText">Preview</span>
            </button>

            <button class="btn-paste" onclick="pasteFromClipboard()">Paste</button>
        </div>
    </div>

    <div class="search-bar" id="searchBar">
        <input type="text" id="searchInput" placeholder="Search code...">
        <button class="btn-find" onclick="findInCode()">Find Next</button>
    </div>

    <div class="main-content">
        <div class="editor-section" id="editorSection">
            <div class="section-header">HTML Code</div>
            <textarea id="htmlCode" placeholder="Type your HTML code here..." oninput="updatePreview()"></textarea>
        </div>

        <div class="preview-section hidden" id="previewSection">
            <div class="section-header">Live Preview</div>
            <iframe id="preview"></iframe>
        </div>
    </div>

    <div class="footer">
        <div class="file-input-group">
            <label>File:</label>
            <input type="text" id="fileName" value="my-page.html" placeholder="file-name.html">
        </div>
        <button class="btn-download" onclick="downloadFile()">
            Download HTML
        </button>
    </div>

    <script>
        let showingPreview = false;
        let lastSearchPos = 0;

        // File Upload
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('htmlCode').value = event.target.result;
                    document.getElementById('fileName').value = file.name;
                    updatePreview();
                };
                reader.readAsText(file);
            }
        });

        // Clear Code
        function clearCode() {
            if (confirm('Do you want to clear all the code?')) {
                document.getElementById('htmlCode').value = '';
                updatePreview();
            }
        }

        // Toggle Preview
        function togglePreview() {
            showingPreview = !showingPreview;
            const editorSection = document.getElementById('editorSection');
            const previewSection = document.getElementById('previewSection');
            const btnText = document.getElementById('previewBtnText');
            const searchBar = document.getElementById('searchBar');

            if (showingPreview) {
                editorSection.classList.add('hidden');
                previewSection.classList.remove('hidden');
                searchBar.classList.add('hidden');
                btnText.textContent = 'Hide';
                updatePreview();
            } else {
                editorSection.classList.remove('hidden');
                previewSection.classList.add('hidden');
                searchBar.classList.remove('hidden');
                btnText.textContent = 'Preview';
            }
        }

        // Update Preview
        function updatePreview() {
            if (showingPreview) {
                const code = document.getElementById('htmlCode').value;
                const preview = document.getElementById('preview');
                preview.srcdoc = code;
            }
        }

        // Professional Search Function
        function findInCode() {
    const textarea = document.getElementById('htmlCode');
    const searchTerm = document.getElementById('searchInput').value;
    
    if (!searchTerm) return;

    const content = textarea.value;
    // මුල් කේතයට වඩා හොඳින් වැඩ කිරීමට Case-insensitive (ලොකු කුඩා අකුරු නොසලකා) සෙවීම එක් කර ඇත
    let index = content.toLowerCase().indexOf(searchTerm.toLowerCase(), lastSearchPos);

    if (index === -1) { 
        index = content.toLowerCase().indexOf(searchTerm.toLowerCase(), 0);
    }

    if (index !== -1) {
        textarea.focus();
        textarea.setSelectionRange(index, index + searchTerm.length);
        
        // --- CURSOR එක ඇති තැනට SCROLL කිරීමේ කොටස ---
        const lineHeight = 20; // textarea එකේ පේළියක දළ උස (පික්සල් වලින්)
        const charactersBefore = content.substring(0, index);
        const linesBefore = charactersBefore.split('\n').length;
        
        // සොයාගත් වචනය තිරය මැදට පෙනෙන ලෙස scroll කරවීම
        textarea.scrollTop = (linesBefore - 1) * lineHeight - (textarea.clientHeight / 2);
        
        lastSearchPos = index + searchTerm.length;
    } else {
        alert("සොයන වචනය හමු නොවීය.");
        lastSearchPos = 0;
    }
}

        // Paste Function
        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                const textarea = document.getElementById('htmlCode');
                const start = textarea.selectionStart;
                const end = textarea.selectionEnd;
                textarea.value = textarea.value.substring(0, start) + text + textarea.value.substring(end);
                updatePreview();
            } catch (err) {
                alert('Clipboard access denied. Please paste manually.');
            }
        }

        // Download File
        function downloadFile() {
            const code = document.getElementById('htmlCode').value;
            const fileName = document.getElementById('fileName').value || 'my-page.html';
            
            if (!code.trim()) {
                alert('Please write some HTML code before downloading!');
                return;
            }
            
            const blob = new Blob([code], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
