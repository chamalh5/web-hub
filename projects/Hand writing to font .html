<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Cursive Font Creator</title>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .header { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px; text-align: center; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .box { background: white; border: 2px solid #e0e0e0; border-radius: 12px; padding: 10px; cursor: pointer; transition: all 0.3s ease; position: relative; text-align: center; }
        .box:hover { border-color: #007bff; transform: translateY(-5px); box-shadow: 0 6px 12px rgba(0,0,0,0.1); }
        .box canvas { width: 100%; height: 100px; background: #fafafa; pointer-events: none; border-radius: 8px; border: 1px solid #eee; }
        .label { font-weight: bold; font-size: 22px; color: #555; display: block; margin-bottom: 8px; }

        /* Full Screen Overlay */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #overlay-canvas-container { position: relative; border: 3px solid #333; background: #fff; width: 90%; height: 60vh; max-width: 900px; border-radius: 10px; overflow: hidden; }
        #full-canvas { width: 100%; height: 100%; touch-action: none; position: relative; z-index: 5; }
        
        /* Colored Guide Lines */
        .guide-lines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .line { position: absolute; width: 100%; border-top-width: 1.5px; border-top-style: dashed; }
        .ascender { border-top-color: #007bff; top: 15%; } /* Blue */
        .x-height { border-top-color: #28a745; top: 40%; }  /* Green */
        .baseline { border-top: 2.5px solid #ff0000; top: 70%; border-top-style: solid; } /* Red Bold */
        .descender { border-top-color: #6f42c1; top: 90%; } /* Purple */

        /* Editor Controls */
        .controls { margin-top: 30px; display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; align-items: center; width: 90%; }
        .control-group { display: flex; align-items: center; gap: 12px; background: #f8f9fa; padding: 10px 20px; border-radius: 10px; border: 1px solid #ddd; }
        
        button { padding: 12px 28px; font-size: 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-save { background: #28a745; color: white; }
        .btn-save:hover { background: #218838; }
        .btn-clear { background: #6c757d; color: white; }
        .btn-close { background: #dc3545; color: white; }
        .btn-zip { background: #007bff; color: white; font-size: 18px; margin-bottom: 10px; width: 250px; }
        
        input[type="range"] { cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Cursive Font Builder</h1>
        <p>Please write an letter on guidlines</p>
        <button class="btn-zip" onclick="downloadAll()">Download ZIP (SVG)</button>
    </div>

    <div class="grid" id="grid"></div>

    <div id="overlay">
        <h1 id="editing-label">Writing: A</h1>
        
        <div id="overlay-canvas-container">
            <div class="guide-lines">
                <div class="line ascender"></div>
                <div class="line x-height"></div>
                <div class="line baseline"></div>
                <div class="line descender"></div>
            </div>
            <canvas id="full-canvas"></canvas>
        </div>

        <div class="controls">
            <div class="control-group">
                <span>Pen size:</span>
                <input type="range" id="pen-width" min="1" max="12" value="3" oninput="updatePen()">
                <b id="pen-val">3</b>
            </div>
            <div class="control-group">
                <span>Pen colour:</span>
                <input type="color" id="pen-color" value="#000000" oninput="updatePen()">
            </div>
            <button class="btn-save" onclick="saveAndClose()">Save & Back</button>
            <button class="btn-clear" onclick="fullPad.clear()">Clear</button>
            <button class="btn-close" onclick="closeOverlay()">Cancel</button>
        </div>
    </div>

    <script>
        // Character set including numbers
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789".split("");
        const pads = {};
        let fullPad;
        let currentLetter = '';

        const grid = document.getElementById('grid');
        const overlay = document.getElementById('overlay');
        const fullCanvas = document.getElementById('full-canvas');
        const penWidthInput = document.getElementById('pen-width');
        const penColorInput = document.getElementById('pen-color');
        const penValLabel = document.getElementById('pen-val');

        // Initialize Signature Pad with Tapering & Smoothing
        fullPad = new SignaturePad(fullCanvas, { 
            minWidth: 1.5, 
            maxWidth: 4.5, 
            penColor: "black",
            velocityFilterWeight: 0.1 // Makes strokes very smooth and natural
        });

        function updatePen() {
            const val = parseFloat(penWidthInput.value);
            penValLabel.innerText = val;
            // Velocity based width calculation
            fullPad.minWidth = val * 0.5;
            fullPad.maxWidth = val * 1.5;
            fullPad.penColor = penColorInput.value;
        }

        // Initialize the Grid
        letters.forEach(char => {
            const div = document.createElement('div');
            div.className = 'box';
            div.onclick = () => openOverlay(char);
            div.innerHTML = `<span class="label">${char}</span><canvas id="can-${char}"></canvas>`;
            grid.appendChild(div);
            pads[char] = { canvas: div.querySelector('canvas'), data: null };
        });

        function openOverlay(char) {
            currentLetter = char;
            document.getElementById('editing-label').innerText = "Writing: " + char;
            overlay.style.display = 'flex';
            
            // Handle high DPI screens for crisp drawing
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            fullCanvas.width = fullCanvas.offsetWidth * ratio;
            fullCanvas.height = fullCanvas.offsetHeight * ratio;
            fullCanvas.getContext("2d").setTransform(ratio, 0, 0, ratio, 0, 0);
            
            fullPad.clear();
            updatePen(); 
            if(pads[char].data) fullPad.fromDataURL(pads[char].data);
        }

        function saveAndClose() {
            if (!fullPad.isEmpty()) {
                const svgData = fullPad.toDataURL("image/svg+xml");
                pads[currentLetter].data = svgData;

                const ctx = pads[currentLetter].canvas.getContext('2d');
                const img = new Image();
                img.onload = () => {
                    ctx.clearRect(0,0, pads[currentLetter].canvas.width, pads[currentLetter].canvas.height);
                    ctx.drawImage(img, 0, 0, pads[currentLetter].canvas.width, pads[currentLetter].canvas.height);
                };
                img.src = svgData;
            }
            closeOverlay();
        }

        function closeOverlay() { overlay.style.display = 'none'; }

        async function downloadAll() {
            const zip = new JSZip();
            let count = 0;
            for(const char in pads) {
                if (pads[char].data) {
                    const base64Data = pads[char].data.split(',')[1];
                    // File naming logic
                    const suffix = char === char.toUpperCase() && isNaN(char) ? "_caps" : "";
                    zip.file(`${char}${suffix}.svg`, base64Data, {base64: true});
                    count++;
                }
            }
            if (count === 0) return alert("Please write at least one letter.");
            
            const content = await zip.generateAsync({type: "blob"});
            saveAs(content, "my_cursive_font_project.zip");
        }
    </script>
</body>
</html>
