<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Teleprompter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
        }

        body {
            font-family: Arial, sans-serif;
            background: #000;
            color: #fff;
            transition: transform 0.3s ease;
        }

        /* Rotation states */
        body.rotate-90 {
            transform: rotate(90deg);
            transform-origin: center center;
            width: 100vh;
            height: 100vw;
            position: absolute;
            left: 50%;
            top: 50%;
            margin-left: -50vh;
            margin-top: -50vw;
        }

        body.rotate-180 {
            transform: rotate(180deg);
        }

        body.rotate-270 {
            transform: rotate(270deg);
            transform-origin: center center;
            width: 100vh;
            height: 100vw;
            position: absolute;
            left: 50%;
            top: 50%;
            margin-left: -50vh;
            margin-top: -50vw;
        }

        #controls {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            padding: 15px;
            z-index: 1000;
            transition: opacity 0.3s;
            max-height: 50vh;
            overflow-y: auto;
        }

        #controls.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .control-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        button {
            padding: 10px 20px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background: #444;
        }

        button:active {
            background: #555;
        }

        input[type="range"] {
            flex: 1;
            min-width: 150px;
        }

        input[type="color"] {
            width: 50px;
            height: 35px;
            border: none;
            cursor: pointer;
        }

        label {
            font-size: 14px;
            margin-right: 5px;
        }

        #prompter {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        #textContainer {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            overflow: hidden;
        }

        #text {
            font-size: 48px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            padding: 20px;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
        }

        #editMode {
            width: 100%;
            height: 100vh;
            background: #000;
            color: #fff;
            border: 2px solid #555;
            padding: 20px;
            font-size: 18px;
            font-family: Arial, sans-serif;
            resize: none;
        }

        .value-display {
            display: inline-block;
            min-width: 40px;
            text-align: center;
            font-weight: bold;
        }

        #showControlsBtn {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 999;
            display: none;
            padding: 10px 15px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 5px;
            cursor: pointer;
        }

        #showControlsBtn.visible {
            display: block;
        }

        /* Floating play/pause buttons */
        #floatingControls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 998;
            display: none;
            gap: 10px;
        }

        #floatingControls.visible {
            display: flex;
        }

        #floatingControls button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 24px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #resetRotateBtn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 998;
            display: none;
            padding: 10px 20px;
            background: #444;
            color: #fff;
            border: 1px solid #666;
            border-radius: 5px;
            cursor: pointer;
        }

        #resetRotateBtn.visible {
            display: block;
        }
    </style>
</head>
<body>
    <button id="showControlsBtn">Show Controls</button>
    
    <!-- Floating Play/Pause buttons -->
    <div id="floatingControls">
        <button id="floatingPlayBtn">▶</button>
        <button id="floatingPauseBtn">⏸</button>
    </div>
    
    <!-- Reset Rotation button -->
    <button id="resetRotateBtn">↻ Reset Rotation</button>
    
    <div id="controls">
        <div class="control-row">
            <button id="playBtn">▶ Play</button>
            <button id="pauseBtn">⏸ Pause</button>
            <button id="resetBtn">↺ Reset</button>
            <button id="editBtn">✎ Edit Text</button>
            <button id="saveBtn" style="display:none;">💾 Save</button>
        </div>
        
        <div class="control-row">
            <label>Speed:</label>
            <input type="range" id="speed" min="1" max="100" value="30">
            <span class="value-display" id="speedVal">30</span>
        </div>
        
        <div class="control-row">
            <label>Text Size:</label>
            <input type="range" id="fontSize" min="20" max="120" value="48">
            <span class="value-display" id="fontSizeVal">48px</span>
        </div>
        
        <div class="control-row">
            <label>Text Color:</label>
            <input type="color" id="textColor" value="#ffffff">
            <label style="margin-left: 20px;">Background:</label>
            <input type="color" id="bgColor" value="#000000">
        </div>
        
        <div class="control-row">
            <button id="fullscreenBtn">⛶ Fullscreen</button>
            <button id="rotateBtn">🔄 Rotate</button>
            <button id="hideControlsBtn">Hide Controls</button>
            <button id="wakeLockBtn">🔆 Keep Screen On</button>
        </div>
    </div>

    <div id="prompter">
        <textarea id="editMode" style="display:none;">Enter your script here...

This is a professional teleprompter app.

You can write unlimited text in any language.

Control the scroll speed, text size, and colors.

Use fullscreen mode for presentations.

Keep your screen awake during recording.

Happy prompting!</textarea>
        <div id="textContainer">
            <div id="text">Enter your script here...

This is a professional teleprompter app.

You can write unlimited text in any language.

Control the scroll speed, text size, and colors.

Use fullscreen mode for presentations.

Keep your screen awake during recording.

Happy prompting!</div>
        </div>
    </div>

    <script>
        let scrolling = false;
        let scrollPosition = 0;
        let scrollSpeed = 30;
        let animationId;
        let wakeLock = null;
        let autoHideTimer;
        let rotation = 0;

        const text = document.getElementById('text');
        const textContainer = document.getElementById('textContainer');
        const editMode = document.getElementById('editMode');
        const controls = document.getElementById('controls');
        const prompter = document.getElementById('prompter');
        const showControlsBtn = document.getElementById('showControlsBtn');
        const floatingControls = document.getElementById('floatingControls');
        const floatingPlayBtn = document.getElementById('floatingPlayBtn');
        const floatingPauseBtn = document.getElementById('floatingPauseBtn');
        const resetRotateBtn = document.getElementById('resetRotateBtn');

        // Auto-hide controls after 5 seconds
        function startAutoHideTimer() {
            clearTimeout(autoHideTimer);
            autoHideTimer = setTimeout(() => {
                controls.classList.add('hidden');
                showControlsBtn.classList.add('visible');
                floatingControls.classList.add('visible');
            }, 5000);
        }

        // Reset timer when user interacts with controls
        controls.addEventListener('click', startAutoHideTimer);
        controls.addEventListener('mousemove', startAutoHideTimer);
        controls.addEventListener('touchstart', startAutoHideTimer);

        // Start the timer initially
        startAutoHideTimer();

        // Play/Pause
        document.getElementById('playBtn').addEventListener('click', () => {
            scrolling = true;
            scroll();
        });

        document.getElementById('pauseBtn').addEventListener('click', () => {
            scrolling = false;
            if (animationId) cancelAnimationFrame(animationId);
        });

        // Floating Play/Pause
        floatingPlayBtn.addEventListener('click', () => {
            scrolling = true;
            scroll();
        });

        floatingPauseBtn.addEventListener('click', () => {
            scrolling = false;
            if (animationId) cancelAnimationFrame(animationId);
        });

        // Reset
        document.getElementById('resetBtn').addEventListener('click', () => {
            scrolling = false;
            scrollPosition = 0;
            text.style.top = '0px';
            if (animationId) cancelAnimationFrame(animationId);
        });

        // Rotate
        document.getElementById('rotateBtn').addEventListener('click', () => {
            document.body.classList.remove('rotate-90', 'rotate-180', 'rotate-270');
            rotation = (rotation + 90) % 360;
            
            if (rotation === 90) {
                document.body.classList.add('rotate-90');
            } else if (rotation === 180) {
                document.body.classList.add('rotate-180');
            } else if (rotation === 270) {
                document.body.classList.add('rotate-270');
            }
            
            // Show reset button if rotated
            if (rotation !== 0) {
                resetRotateBtn.classList.add('visible');
            } else {
                resetRotateBtn.classList.remove('visible');
            }
            
            scrollPosition = 0;
            text.style.top = '0px';
        });

        // Reset Rotation
        resetRotateBtn.addEventListener('click', () => {
            document.body.classList.remove('rotate-90', 'rotate-180', 'rotate-270');
            rotation = 0;
            resetRotateBtn.classList.remove('visible');
            scrollPosition = 0;
            text.style.top = '0px';
        });

        // Edit/Save
        document.getElementById('editBtn').addEventListener('click', () => {
            textContainer.style.display = 'none';
            editMode.style.display = 'block';
            document.getElementById('editBtn').style.display = 'none';
            document.getElementById('saveBtn').style.display = 'inline-block';
            editMode.value = text.textContent;
        });

        document.getElementById('saveBtn').addEventListener('click', () => {
            text.textContent = editMode.value;
            editMode.style.display = 'none';
            textContainer.style.display = 'flex';
            document.getElementById('editBtn').style.display = 'inline-block';
            document.getElementById('saveBtn').style.display = 'none';
            scrollPosition = 0;
            text.style.top = '0px';
        });

        // Speed control
        document.getElementById('speed').addEventListener('input', (e) => {
            scrollSpeed = e.target.value;
            document.getElementById('speedVal').textContent = e.target.value;
        });

        // Font size
        document.getElementById('fontSize').addEventListener('input', (e) => {
            text.style.fontSize = e.target.value + 'px';
            editMode.style.fontSize = Math.max(18, e.target.value * 0.4) + 'px';
            document.getElementById('fontSizeVal').textContent = e.target.value + 'px';
        });

        // Colors
        document.getElementById('textColor').addEventListener('input', (e) => {
            text.style.color = e.target.value;
            editMode.style.color = e.target.value;
        });

        document.getElementById('bgColor').addEventListener('input', (e) => {
            document.body.style.background = e.target.value;
            editMode.style.background = e.target.value;
        });

        // Fullscreen
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Hide/Show Controls
        document.getElementById('hideControlsBtn').addEventListener('click', () => {
            clearTimeout(autoHideTimer);
            controls.classList.add('hidden');
            showControlsBtn.classList.add('visible');
            floatingControls.classList.add('visible');
        });

        showControlsBtn.addEventListener('click', () => {
            controls.classList.remove('hidden');
            showControlsBtn.classList.remove('visible');
            floatingControls.classList.remove('visible');
            startAutoHideTimer();
        });

        // Wake Lock
        document.getElementById('wakeLockBtn').addEventListener('click', async () => {
            try {
                if (wakeLock === null) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    document.getElementById('wakeLockBtn').textContent = '🔆 Screen On ✓';
                    document.getElementById('wakeLockBtn').style.background = '#2a5';
                } else {
                    wakeLock.release();
                    wakeLock = null;
                    document.getElementById('wakeLockBtn').textContent = '🔆 Keep Screen On';
                    document.getElementById('wakeLockBtn').style.background = '#333';
                }
            } catch (err) {
                alert('Wake Lock not supported on this device/browser');
            }
        });

        // Scroll function
        function scroll() {
            if (!scrolling) return;
            
            scrollPosition += scrollSpeed / 30;
            text.style.top = -scrollPosition + 'px';
            
            animationId = requestAnimationFrame(scroll);
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (editMode.style.display === 'block') return;
            
            if (e.code === 'Space') {
                e.preventDefault();
                if (scrolling) {
                    document.getElementById('pauseBtn').click();
                } else {
                    document.getElementById('playBtn').click();
                }
            } else if (e.code === 'KeyR') {
                document.getElementById('resetBtn').click();
            } else if (e.code === 'KeyH') {
                document.getElementById('hideControlsBtn').click();
            }
        });
    </script>
</body>
</html>
