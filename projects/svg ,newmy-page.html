<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Metadata Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .upload-section {
            border: 3px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            background: #f8f9ff;
            transition: all 0.3s;
        }
        .upload-section:hover {
            border-color: #764ba2;
            background: #f0f1ff;
        }
        .upload-section input[type="file"] {
            display: none;
        }
        .upload-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .upload-btn:hover {
            transform: translateY(-2px);
        }
        .metadata-form {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .files-list {
            margin-bottom: 30px;
        }
        .file-item {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .file-info {
            flex: 1;
        }
        .file-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        .file-meta {
            font-size: 12px;
            color: #666;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn-secondary:hover {
            background: #5a6268;
        }
        .results {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
        }
        .result-item {
            background: white;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
        }
        .result-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }
        .download-link {
            display: inline-block;
            background: #28a745;
            color: white;
            padding: 8px 20px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 14px;
            margin-top: 10px;
        }
        .download-link:hover {
            background: #218838;
        }
        .status {
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }
        .status-success {
            background: #d4edda;
            color: #155724;
        }
        .status-info {
            background: #d1ecf1;
            color: #0c5460;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 SVG Metadata Editor</h1>
        <p class="subtitle">Upload multiple SVG files to check and modify their metadata</p>

        <div class="upload-section">
            <input type="file" id="fileInput" accept=".svg" multiple>
            <label for="fileInput" class="upload-btn">📁 Select SVG Files</label>
            <p style="margin-top: 15px; color: #666;">You can select multiple files at once</p>
        </div>

        <div id="filesSection" style="display: none;">
            <h2 style="margin-bottom: 15px;">Uploaded Files</h2>
            <div id="filesList" class="files-list"></div>

            <h2 style="margin-bottom: 15px;">Metadata Settings</h2>
            <div class="metadata-form">
                <div class="form-group">
                    <label for="author">Author Name:</label>
                    <input type="text" id="author" placeholder="e.g., John Doe">
                </div>
                <div class="form-group">
                    <label for="copyright">Copyright Owner:</label>
                    <input type="text" id="copyright" placeholder="e.g., Company Name © 2024">
                </div>
                <div class="form-group">
                    <label for="title">Title (optional):</label>
                    <input type="text" id="title" placeholder="e.g., Logo Design">
                </div>
                <div class="form-group">
                    <label for="description">Description (optional):</label>
                    <textarea id="description" placeholder="e.g., A beautiful logo design for..."></textarea>
                </div>
                <div class="form-group">
                    <label for="keywords">Keywords (optional, comma-separated):</label>
                    <input type="text" id="keywords" placeholder="e.g., logo, design, vector">
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="processFiles()">✨ Add Metadata to All Files</button>
                <button class="btn btn-secondary" onclick="checkMetadata()">🔍 Check Current Metadata</button>
            </div>

            <div id="downloadAllSection" style="display: none; text-align: center; margin-bottom: 20px;">
                <button class="btn btn-primary" onclick="downloadAllAsZip()" style="font-size: 18px; padding: 15px 40px;">
                    📦 Download All as ZIP
                </button>
            </div>

            <div id="results"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        let uploadedFiles = [];
        let processedBlobs = [];

        document.getElementById('fileInput').addEventListener('change', function(e) {
            uploadedFiles = Array.from(e.target.files);
            displayFiles();
        });

        function displayFiles() {
            const filesList = document.getElementById('filesList');
            const filesSection = document.getElementById('filesSection');
            
            if (uploadedFiles.length === 0) {
                filesSection.style.display = 'none';
                return;
            }

            filesSection.style.display = 'block';
            filesList.innerHTML = '';

            uploadedFiles.forEach((file, index) => {
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';
                fileItem.innerHTML = `
                    <div class="file-info">
                        <div class="file-name">${file.name}</div>
                        <div class="file-meta">Size: ${(file.size / 1024).toFixed(2)} KB</div>
                    </div>
                `;
                filesList.appendChild(fileItem);
            });
        }

        async function checkMetadata() {
            const results = document.getElementById('results');
            results.innerHTML = '<div class="status status-info">Checking metadata...</div>';

            let output = '';

            for (let file of uploadedFiles) {
                const text = await file.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'image/svg+xml');
                
                const metadata = doc.querySelector('metadata');
                const title = doc.querySelector('title');
                const desc = doc.querySelector('desc');

                let metaInfo = '<strong>Existing Metadata:</strong><br>';
                
                if (title) {
                    metaInfo += `📝 Title: ${title.textContent}<br>`;
                }
                if (desc) {
                    metaInfo += `📄 Description: ${desc.textContent}<br>`;
                }
                if (metadata) {
                    metaInfo += `📦 Metadata block found<br>`;
                    metaInfo += `<pre style="background:#f0f0f0;padding:10px;border-radius:4px;overflow-x:auto;margin-top:10px;">${escapeHtml(metadata.outerHTML)}</pre>`;
                } else {
                    metaInfo += `⚠️ No metadata block found<br>`;
                }

                output += `
                    <div class="result-item">
                        <div class="result-name">${file.name}</div>
                        <div>${metaInfo}</div>
                    </div>
                `;
            }

            results.innerHTML = output;
        }

        async function processFiles() {
            const author = document.getElementById('author').value;
            const copyright = document.getElementById('copyright').value;
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const keywords = document.getElementById('keywords').value;

            if (!author && !copyright) {
                alert('Please enter at least Author or Copyright information');
                return;
            }

            const results = document.getElementById('results');
            results.innerHTML = '<div class="status status-info">Processing files...</div>';

            processedBlobs = []; // Reset processed files
            let output = '';

            for (let file of uploadedFiles) {
                const text = await file.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'image/svg+xml');
                const svg = doc.documentElement;

                // Remove existing metadata if present
                const existingMetadata = svg.querySelector('metadata');
                if (existingMetadata) {
                    existingMetadata.remove();
                }

                // Remove existing title/desc if we're adding new ones
                if (title) {
                    const existingTitle = svg.querySelector('title');
                    if (existingTitle) existingTitle.remove();
                }
                if (description) {
                    const existingDesc = svg.querySelector('desc');
                    if (existingDesc) existingDesc.remove();
                }

                // Create metadata element
                const metadata = doc.createElementNS('http://www.w3.org/2000/svg', 'metadata');
                
                // Add Dublin Core metadata
                let metadataContent = '\n';
                if (title) {
                    metadataContent += `    <dc:title>${escapeXml(title)}</dc:title>\n`;
                }
                if (description) {
                    metadataContent += `    <dc:description>${escapeXml(description)}</dc:description>\n`;
                }
                if (author) {
                    metadataContent += `    <dc:creator>${escapeXml(author)}</dc:creator>\n`;
                }
                if (copyright) {
                    metadataContent += `    <dc:rights>${escapeXml(copyright)}</dc:rights>\n`;
                }
                if (keywords) {
                    metadataContent += `    <dc:subject>${escapeXml(keywords)}</dc:subject>\n`;
                }
                metadataContent += `    <dc:date>${new Date().toISOString()}</dc:date>\n  `;

                metadata.innerHTML = metadataContent;

                // Add title and description as direct children if provided
                if (title) {
                    const titleEl = doc.createElementNS('http://www.w3.org/2000/svg', 'title');
                    titleEl.textContent = title;
                    svg.insertBefore(titleEl, svg.firstChild);
                }
                if (description) {
                    const descEl = doc.createElementNS('http://www.w3.org/2000/svg', 'desc');
                    descEl.textContent = description;
                    svg.insertBefore(descEl, svg.firstChild);
                }

                // Insert metadata at the beginning
                svg.insertBefore(metadata, svg.firstChild);

                // Add Dublin Core namespace
                svg.setAttribute('xmlns:dc', 'http://purl.org/dc/elements/1.1/');

                // Serialize back to string
                const serializer = new XMLSerializer();
                const modifiedSvg = serializer.serializeToString(doc);

                // Create download blob
                const blob = new Blob([modifiedSvg], { type: 'image/svg+xml' });
                const url = URL.createObjectURL(blob);

                // Store for ZIP download
                processedBlobs.push({ blob: blob, filename: file.name });

                output += `
                    <div class="result-item">
                        <div class="result-name">✅ ${file.name}</div>
                        <div>Metadata successfully added!</div>
                        <a href="${url}" download="${file.name}" class="download-link">⬇️ Download</a>
                    </div>
                `;
            }

            results.innerHTML = '<div class="status status-success">✨ All files processed successfully!</div>' + output;
            
            // Show download all button
            document.getElementById('downloadAllSection').style.display = 'block';
        }

        async function downloadAllAsZip() {
            if (processedBlobs.length === 0) {
                alert('No processed files to download');
                return;
            }

            const zip = new JSZip();
            
            // Add each file to the ZIP
            processedBlobs.forEach(item => {
                zip.file(item.filename, item.blob);
            });

            // Generate the ZIP file
            const zipBlob = await zip.generateAsync({ type: 'blob' });
            
            // Create download link
            const url = URL.createObjectURL(zipBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `svg_with_metadata_${Date.now()}.zip`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeXml(text) {
            return text.replace(/&/g, '&amp;')
                      .replace(/</g, '&lt;')
                      .replace(/>/g, '&gt;')
                      .replace(/"/g, '&quot;')
                      .replace(/'/g, '&apos;');
        }
    </script>
</body>
</html>
